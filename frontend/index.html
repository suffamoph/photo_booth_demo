<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>咔咔AI照相机 Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="chat-shell">
      <header class="chat-header">
        <div>
          <h1>咔咔AI照相机</h1>
          <p>自然语言输入、意图识别、ComfyUI 生成，统一在对话流中查看。</p>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite">
        <article class="message-row assistant-row">
          <div class="avatar">K</div>
          <div class="bubble assistant-bubble intro-bubble">
            <p>在下方输入需求，并上传照片</p>
          </div>
        </article>
      </section>

      <section class="composer-wrap">
        <form id="demo-form" class="composer">
          <div class="composer-row">
            <label class="upload-field upload-plus" for="photo" aria-label="上传照片">
              <svg class="upload-plus-icon" viewBox="0 0 1024 1024" aria-hidden="true">
                <path d="M478.364444 0v482.517333H0v65.514667h478.364444V1024H544V548.032H1024v-65.514667H543.992889V0z"></path>
              </svg>
              <input id="photo" name="photo" type="file" accept="image/*" required />
            </label>

            <label class="sr-only" for="input-text">需求描述</label>
            <textarea
              id="input-text"
              name="input-text"
              rows="1"
              placeholder="例如：帮我做一张白底证件照"
              required
            ></textarea>

            <button id="submit-btn" type="submit">发送</button>
          </div>

          <div class="composer-options">
            <label class="option-field" for="size-select">
              <span>尺寸</span>
              <select id="size-select" name="size">
                <option value="One inch		(413, 295)">One inch (413, 295)</option>
                <option value="Two inches		(626, 413)">Two inches (626, 413)</option>
              </select>
            </label>

            <label class="option-field" for="bgcolor-select">
              <span>底色</span>
              <select id="bgcolor-select" name="bgcolor">
                <option value="White">White</option>
                <option value="Blue">Blue</option>
                <option value="Red">Red</option>
                <option value="Dark Blue">Dark Blue</option>
                <option value="Light Grey">Light Grey</option>
              </select>
            </label>
          </div>

          <div id="composer-preview-wrap" class="composer-preview-wrap" hidden>
            <button id="composer-preview-remove" class="composer-preview-remove" type="button" aria-label="移除待发送图片">×</button>
            <button id="composer-preview-button" class="composer-preview-button" type="button" aria-label="查看待发送图片大图">
              <img id="composer-preview-image" class="composer-preview-image" alt="待发送图片预览" />
            </button>
          </div>
        </form>
      </section>
    </main>

    <div id="lightbox" class="lightbox" hidden>
      <button id="lightbox-close" class="lightbox-close" type="button" aria-label="关闭大图">关闭</button>
      <img id="lightbox-image" class="lightbox-image" alt="大图预览" />
    </div>

    <div id="json-modal" class="json-modal" hidden>
      <div class="json-modal-panel">
        <div class="json-modal-head">
          <h2>识别结果 JSON</h2>
          <button id="json-modal-close" class="json-modal-close" type="button" aria-label="关闭 JSON 预览">关闭</button>
        </div>
        <pre id="json-modal-content" class="json-modal-content">-</pre>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
